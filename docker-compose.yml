services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: paks_user
      POSTGRES_PASSWORD: paks_password
      POSTGRES_DB: paks_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data: